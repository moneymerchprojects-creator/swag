<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">

<title>MM — Sheets Bot</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Unbounded:wght@400;700;900&display=swap" rel="stylesheet">
<style>
:root{--bg:#080808;--surface:#111;--border:#222;--accent:#c6f135;--text:#fff;--muted:#555;--radius:16px;}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;}
body{background:var(--bg);color:var(--text);font-family:'Space Mono',monospace;display:flex;flex-direction:column;height:100vh;overflow:hidden;}
header{display:flex;align-items:center;justify-content:space-between;padding:16px 28px;border-bottom:1px solid var(--border);flex-shrink:0;}
.logo-area{display:flex;align-items:center;gap:14px;}
.logo-text{font-family:'Unbounded',sans-serif;font-weight:900;font-size:14px;letter-spacing:0.05em;color:var(--accent);line-height:1.1;}
.logo-sub{font-size:9px;color:var(--muted);letter-spacing:0.15em;margin-top:2px;}
.status-dot{display:flex;align-items:center;gap:8px;font-size:11px;color:var(--muted);letter-spacing:0.08em;}
.dot{width:7px;height:7px;border-radius:50%;background:var(--accent);animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}
.chat-wrap{flex:1;overflow-y:auto;padding:28px;display:flex;flex-direction:column;gap:16px;scrollbar-width:thin;scrollbar-color:var(--border) transparent;}
.chat-wrap::-webkit-scrollbar{width:4px;}
.chat-wrap::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px;}
.msg{max-width:680px;display:flex;flex-direction:column;gap:6px;animation:fadeUp 0.3s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.msg.user{align-self:flex-end;align-items:flex-end;}
.msg.bot{align-self:flex-start;align-items:flex-start;}
.msg-label{font-size:10px;letter-spacing:0.12em;color:var(--muted);padding:0 4px;}
.msg-bubble{padding:14px 18px;border-radius:var(--radius);font-size:13px;line-height:1.7;white-space:pre-wrap;word-break:break-word;}
.msg.user .msg-bubble{background:#161616;border:1px solid var(--border);border-bottom-right-radius:4px;color:#ccc;}
.msg.bot .msg-bubble{background:#0f1a00;border:1px solid #1e2e00;border-bottom-left-radius:4px;color:var(--accent);}
.msg-bubble a{color:var(--accent);text-decoration:underline;word-break:break-all;}
.msg-img{max-width:240px;border-radius:10px;border:1px solid var(--border);margin-top:4px;}
.typing-dots{display:flex;gap:5px;align-items:center;padding:6px 0;}
.typing-dots span{width:7px;height:7px;border-radius:50%;background:var(--accent);animation:bounce 1.2s infinite;}
.typing-dots span:nth-child(2){animation-delay:0.2s}
.typing-dots span:nth-child(3){animation-delay:0.4s}
@keyframes bounce{0%,80%,100%{transform:scale(0.6);opacity:0.4}40%{transform:scale(1);opacity:1}}
.welcome{display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1;text-align:center;gap:16px;padding:40px;animation:fadeUp 0.5s ease;}
.welcome h2{font-family:'Unbounded',sans-serif;font-size:20px;font-weight:900;color:var(--accent);}
.welcome p{font-size:12px;color:var(--muted);line-height:1.8;max-width:380px;}
.welcome-tags{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;margin-top:8px;}
.tag{font-size:10px;letter-spacing:0.08em;padding:5px 12px;border:1px solid var(--border);border-radius:100px;color:var(--muted);cursor:pointer;transition:all 0.2s;}
.tag:hover{border-color:var(--accent);color:var(--accent);}
.input-area{flex-shrink:0;border-top:1px solid var(--border);padding:14px 28px 18px;}
.input-wrap{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);display:flex;flex-direction:column;max-width:800px;margin:0 auto;transition:border-color 0.2s;}
.input-wrap:focus-within{border-color:#333;}
.client-row{display:flex;border-bottom:1px solid var(--border);}
.client-input{flex:1;background:transparent;border:none;outline:none;padding:9px 14px;font-size:11px;font-family:'Space Mono',monospace;color:var(--muted);letter-spacing:0.06em;}
.client-input::placeholder{color:#2a2a2a;}
.client-input:not(:last-child){border-right:1px solid var(--border);}
textarea#mainInput{background:transparent;border:none;outline:none;padding:12px 14px 8px;font-size:13px;font-family:'Space Mono',monospace;color:var(--text);line-height:1.6;resize:none;min-height:64px;max-height:160px;width:100%;}
textarea#mainInput::placeholder{color:#2a2a2a;}
.input-bottom{display:flex;align-items:center;justify-content:space-between;padding:6px 10px;}
.attach-btn{background:none;border:1px solid var(--border);border-radius:8px;color:var(--muted);font-size:10px;font-family:'Space Mono',monospace;padding:5px 10px;cursor:pointer;letter-spacing:0.06em;transition:all 0.2s;}
.attach-btn:hover{border-color:#444;color:#888;}
.send-btn{background:var(--accent);border:none;border-radius:10px;color:#000;font-size:11px;font-family:'Unbounded',sans-serif;font-weight:700;padding:8px 18px;cursor:pointer;letter-spacing:0.06em;transition:all 0.15s;}
.send-btn:hover{background:#d4ff4a;transform:scale(1.02);}
.send-btn:active{transform:scale(0.98);}
.send-btn:disabled{opacity:0.4;cursor:not-allowed;transform:none;}
.file-preview{display:flex;gap:8px;flex-wrap:wrap;padding:6px 12px 0;}
.file-chip{display:flex;align-items:center;gap:6px;background:#1a1a1a;border:1px solid var(--border);border-radius:8px;padding:3px 8px;font-size:10px;color:var(--muted);}
.file-chip .rx{cursor:pointer;color:#444;}
.file-chip .rx:hover{color:#888;}
#fileInput{display:none;}
</style>

function quickFill(t){document.getElementById('mainInput').value=t;document.getElementById('mainInput').focus();}

function handleFiles(files){
  Array.from(files).forEach(f=>{
    const r=new FileReader();

function addMsg(role,content,isHTML=false){
  const w=document.getElementById('welcome');if(w)w.remove();
  const wrap=document.getElementById('chatWrap');
  const div=document.createElement('div');div.className=`msg ${role}`;
  const label=document.createElement('div');label.className='msg-label';label.textContent=role==='user'?'ВЫ':'MM BOT';

function addTyping(){
  const w=document.getElementById('welcome');if(w)w.remove();

  wrap.appendChild(div);wrap.scrollTop=wrap.scrollHeight;
}
function removeTyping(){const t=document.getElementById('typing');if(t)t.remove();}

async function getGoogleToken(){
  const enc=s=>btoa(unescape(encodeURIComponent(s))).replace(/=/g,'').replace(/\+/g,'-').replace(/\//g,'_');
  const header=enc(JSON.stringify({alg:'RS256',typ:'JWT'}));
  const now=Math.floor(Date.now()/1000);
  const claim=enc(JSON.stringify({
    iss:SA_EMAIL,
    scope:'https://www.googleapis.com/auth/drive https://www.googleapis.com/auth/spreadsheets',
    aud:'https://oauth2.googleapis.com/token',
    exp:now+3600,iat:now
  }));
  const pem=SA_KEY.replace(/-----BEGIN PRIVATE KEY-----|-----END PRIVATE KEY-----|\n/g,'');
  const der=Uint8Array.from(atob(pem),c=>c.charCodeAt(0));
  const key=await crypto.subtle.importKey('pkcs8',der,{name:'RSASSA-PKCS1-v1_5',hash:'SHA-256'},false,['sign']);
  const sig=await crypto.subtle.sign('RSASSA-PKCS1-v1_5',key,new TextEncoder().encode(header+'.'+claim));
  const sigB64=btoa(String.fromCharCode(...new Uint8Array(sig))).replace(/=/g,'').replace(/\+/g,'-').replace(/\//g,'_');
  const jwt=`${header}.${claim}.${sigB64}`;
  const r=await fetch(`${WORKER}?target=token`,{
    method:'POST',
    headers:{'Content-Type':'application/x-www-form-urlencoded'},
    body:`grant_type=urn%3Aietf%3Aparams%3Aoauth%3Agrant-type%3Ajwt-bearer&assertion=${jwt}`
  });
  const d=await r.json();
  if(!d.access_token)throw new Error('Google token error: '+JSON.stringify(d));
  return d.access_token;
}

async function callClaude(text,images){
  const content=[];
  images.filter(f=>f.type.startsWith('image/')).forEach(img=>{
    content.push({type:'image',source:{type:'base64',media_type:img.type,data:img.data.split(',')[1]}});
  });
  content.push({type:'text',text:`Из данных ниже извлеки компоненты подарочного набора и верни ТОЛЬКО валидный JSON без пояснений и без markdown:
{"components":[{"name":"название","desc":"спецификация","type":"Себес РФ","signal":число_или_null,"cost_per_unit":число_или_null,"deadline_signal":"7 р.д.","deadline_50":"10 р.д.","comment":"","supplier":""}]}

Данные: ${text}`});

  const r=await fetch(`${WORKER}?target=claude`,{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({
      model:'claude-haiku-4-5-20251001',
      max_tokens:1000,
      messages:[{role:'user',content}]
    })
  });
  const d=await r.json();
  if(d.error)throw new Error(d.error.message);
  const raw=d.content?.map(c=>c.text||'').join('');
  return JSON.parse(raw.replace(/```json|```/g,'').trim());
}

async function gApi(token,url,method,body){
  const r=await fetch(url,{
    method,
    headers:{'Content-Type':'application/json','Authorization':'Bearer '+token},
    body:(body&&method!=='GET')?JSON.stringify(body):undefined
  });
  return r.json();
}

async function createSheet(clientName,setName,comps){
  const token=await getGoogleToken();
  const total=comps.reduce((s,c)=>s+(parseFloat(c.cost_per_unit)||0),0);
  const rows=[
    ['','','','','','','','','Стоимость в руб/шт за ед (себес)','','','Сроки (обязательно в рабочих днях)','','',''],
    ['ID','Тип строки','Ссылка/Фото','Изделие / брендинг','Описание (спецификация)','Поставщик (если бланк)','Комментарии от ПД','Тип расчета','Сигнал','50 шт','Себест/шт (формула)','Сигнал','50 шт','Цена/шт','Итого'],
    ...comps.map((c,i)=>[1,i===0?setName:'','',c.name,c.desc,c.supplier||'',c.comment||'',c.type||'Себес РФ',c.signal||'',c.cost_per_unit||'',i===0?total:'',c.deadline_signal||'',c.deadline_50||'','','']),
    Array(15).fill(''),
    ['','Итого:','','','','','','','','','','','','','']
  ];
  const date=new Date().toLocaleDateString('ru-RU');

  const ss=await gApi(token,'https://sheets.googleapis.com/v4/spreadsheets','POST',{
    properties:{title:`Спецификация_${clientName}_${date}`},
    sheets:[{properties:{title:'Спецификация'}}]
  });
  if(!ss.spreadsheetId)throw new Error(JSON.stringify(ss));
  const id=ss.spreadsheetId;

  await gApi(token,`https://sheets.googleapis.com/v4/spreadsheets/${id}/values/Спецификация!A1?valueInputOption=USER_ENTERED`,'PUT',{values:rows});
  await gApi(token,`https://www.googleapis.com/drive/v3/files/${id}?addParents=${FOLDER_ID}&removeParents=root&fields=id`,'PATCH',{});

  return `https://docs.google.com/spreadsheets/d/${id}`;
}

async function handleSend(){
  const text=document.getElementById('mainInput').value.trim();
  const clientName=document.getElementById('clientName').value.trim()||'Клиент';
  const setName=document.getElementById('setName').value.trim()||'Набор';
  if(!text&&attachedFiles.length===0)return;
  const btn=document.getElementById('sendBtn');btn.disabled=true;
  let userMsg=text;
  if(attachedFiles.length>0)userMsg+=(text?'\n':'')+attachedFiles.map(f=>`[${f.name}]`).join(' ');
  addMsg('user',userMsg);
  attachedFiles.filter(f=>f.type.startsWith('image/')).forEach(f=>{
    const wrap=document.getElementById('chatWrap');
    const div=document.createElement('div');div.className='msg user';
    div.innerHTML=`<img class="msg-img" src="${f.data}"/>`;
    wrap.appendChild(div);wrap.scrollTop=wrap.scrollHeight;
  });
  document.getElementById('mainInput').value='';
  const files=[...attachedFiles];attachedFiles=[];renderPreviews();
  addTyping();
  try{
    const parsed=await callClaude(`Клиент: ${clientName}\nНабор: ${setName}\n${text}`,files);
    removeTyping();
    const comps=parsed.components||[];
    if(comps.length===0)throw new Error('Не удалось распознать компоненты');
    const summary=comps.map((c,i)=>`${i+1}. ${c.name}${c.signal?' — '+c.signal+' руб/50шт':''}${c.deadline_signal?', срок '+c.deadline_signal:''}`).join('\n');
    addMsg('bot',`Распознал ${comps.length} компонент(а):\n\n${summary}\n\nСоздаю таблицу...`);
    addTyping();
    const link=await createSheet(clientName,setName,comps);
    removeTyping();
    addMsg('bot',`Готово! Таблица создана:\n\n<a href="${link}" target="_blank">→ Открыть в Google Sheets</a>`,true);
  }catch(e){
    removeTyping();
    addMsg('bot','Ошибка: '+e.message);
  }
  btn.disabled=false;
}

document.getElementById('mainInput').addEventListener('keydown',e=>{
  if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();handleSend();}
});
