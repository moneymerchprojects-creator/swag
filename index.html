<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MM — Sheets Bot</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Unbounded:wght@400;700;900&display=swap" rel="stylesheet">
<script src="https://accounts.google.com/gsi/client" async defer></script>
<style>
:root{--bg:#080808;--surface:#111;--border:#222;--accent:#c6f135;--text:#fff;--muted:#555;--radius:14px;}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;overflow:hidden;}
body{background:var(--bg);color:var(--text);font-family:'Space Mono',monospace;display:flex;flex-direction:column;height:100vh;}

header{display:flex;align-items:center;justify-content:space-between;padding:12px 20px;border-bottom:1px solid var(--border);flex-shrink:0;min-height:56px;}
.logo-area{display:flex;align-items:center;gap:12px;}
.logo-text{font-family:'Unbounded',sans-serif;font-weight:900;font-size:13px;letter-spacing:0.05em;color:var(--accent);line-height:1.1;}
.logo-sub{font-size:8px;color:var(--muted);letter-spacing:0.15em;margin-top:2px;}
.header-right{display:flex;align-items:center;gap:10px;}
.badge{font-size:10px;color:var(--accent);letter-spacing:0.08em;display:flex;align-items:center;gap:6px;}
.badge .dot{width:6px;height:6px;border-radius:50%;background:var(--accent);animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}
.btn-sm{font-size:10px;color:var(--muted);background:none;border:1px solid var(--border);border-radius:6px;padding:3px 8px;cursor:pointer;font-family:'Space Mono',monospace;letter-spacing:0.05em;}
.btn-sm:hover{color:#fff;border-color:#444;}

/* AUTH */
.auth-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1;gap:20px;padding:40px;text-align:center;}
.auth-screen h2{font-family:'Unbounded',sans-serif;font-size:18px;font-weight:900;color:var(--accent);}
.auth-screen p{font-size:12px;color:var(--muted);line-height:1.8;max-width:320px;}
.google-btn{display:flex;align-items:center;gap:10px;background:#fff;color:#000;border:none;border-radius:10px;padding:12px 24px;font-size:13px;font-weight:500;cursor:pointer;font-family:'Space Mono',monospace;transition:all 0.2s;}
.google-btn:hover{transform:scale(1.02);}
.google-btn svg{width:18px;height:18px;flex-shrink:0;}

/* LAYOUT */
.app{display:none;flex:1;overflow:hidden;}
.app.visible{display:flex;flex-direction:row;}

/* SIDEBAR */
.sidebar{width:200px;min-width:200px;border-right:1px solid var(--border);display:flex;flex-direction:column;background:var(--bg);}
.sidebar-top{padding:12px;border-bottom:1px solid var(--border);}
.new-btn{width:100%;padding:9px;font-size:10px;font-family:'Unbounded',sans-serif;font-weight:700;letter-spacing:0.08em;background:var(--accent);color:#000;border:none;border-radius:8px;cursor:pointer;transition:all 0.15s;}
.new-btn:hover{background:#d4ff4a;}
.tabs{flex:1;overflow-y:auto;padding:6px;}
.tab{padding:9px 10px;border-radius:8px;cursor:pointer;margin-bottom:3px;border:1px solid transparent;transition:all 0.15s;position:relative;}
.tab:hover{background:var(--surface);border-color:var(--border);}
.tab.active{background:#161616;border-color:#333;}
.tab-name{font-size:11px;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:2px;}
.tab-meta{font-size:9px;color:var(--muted);}
.tab-del{position:absolute;top:7px;right:8px;font-size:13px;color:#333;opacity:0;cursor:pointer;background:none;border:none;line-height:1;padding:0;}
.tab:hover .tab-del{opacity:1;}
.tab-del:hover{color:#e05;}

/* MAIN */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0;}
.chat-wrap{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:12px;scrollbar-width:thin;scrollbar-color:var(--border) transparent;}
.chat-wrap::-webkit-scrollbar{width:3px;}
.chat-wrap::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px;}

.msg{max-width:620px;display:flex;flex-direction:column;gap:4px;animation:fadeUp 0.25s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.msg.user{align-self:flex-end;align-items:flex-end;}
.msg.bot{align-self:flex-start;align-items:flex-start;}
.msg-label{font-size:9px;letter-spacing:0.1em;color:var(--muted);padding:0 4px;}
.msg-bubble{padding:11px 15px;border-radius:13px;font-size:12px;line-height:1.7;white-space:pre-wrap;word-break:break-word;}
.msg.user .msg-bubble{background:#1a1a1a;border:1px solid var(--border);border-bottom-right-radius:3px;color:#ccc;}
.msg.bot .msg-bubble{background:#0a1500;border:1px solid #1a2800;border-bottom-left-radius:3px;color:var(--accent);}
.msg-bubble a{color:var(--accent);text-decoration:underline;word-break:break-all;}
.msg-img{max-width:200px;border-radius:8px;border:1px solid var(--border);margin-top:4px;}
.typing-dots{display:flex;gap:4px;align-items:center;padding:4px 0;}
.typing-dots span{width:6px;height:6px;border-radius:50%;background:var(--accent);animation:bounce 1.2s infinite;}
.typing-dots span:nth-child(2){animation-delay:0.2s}
.typing-dots span:nth-child(3){animation-delay:0.4s}
@keyframes bounce{0%,80%,100%{transform:scale(0.6);opacity:0.4}40%{transform:scale(1);opacity:1}}

.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1;gap:12px;text-align:center;padding:40px;color:var(--muted);}
.empty h3{font-family:'Unbounded',sans-serif;font-size:13px;font-weight:700;color:var(--accent);}
.empty p{font-size:11px;line-height:1.8;max-width:300px;}
.etags{display:flex;gap:6px;flex-wrap:wrap;justify-content:center;margin-top:6px;}
.etag{font-size:9px;padding:4px 10px;border:1px solid var(--border);border-radius:100px;color:var(--muted);cursor:pointer;transition:all 0.2s;letter-spacing:0.05em;}
.etag:hover{border-color:var(--accent);color:var(--accent);}

.nosel{display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1;gap:8px;color:var(--muted);text-align:center;}
.nosel h3{font-family:'Unbounded',sans-serif;font-size:12px;color:#333;}

/* Table link bar */
.table-bar{padding:8px 20px;border-bottom:1px solid var(--border);font-size:10px;color:var(--muted);display:none;align-items:center;gap:8px;flex-shrink:0;}
.table-bar.visible{display:flex;}
.table-bar a{color:var(--accent);text-decoration:none;letter-spacing:0.05em;}
.table-bar a:hover{text-decoration:underline;}

/* INPUT */
.input-area{flex-shrink:0;border-top:1px solid var(--border);padding:10px 16px 12px;}
.input-wrap{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);display:flex;flex-direction:column;}
.input-wrap:focus-within{border-color:#333;}
.client-row{display:flex;border-bottom:1px solid var(--border);}
.ci{flex:1;background:transparent;border:none;outline:none;padding:7px 11px;font-size:10px;font-family:'Space Mono',monospace;color:var(--muted);letter-spacing:0.05em;}
.ci::placeholder{color:#2a2a2a;}
.ci:not(:last-child){border-right:1px solid var(--border);}
textarea#mi{background:transparent;border:none;outline:none;padding:9px 11px 6px;font-size:12px;font-family:'Space Mono',monospace;color:var(--text);line-height:1.6;resize:none;min-height:52px;max-height:130px;width:100%;}
textarea#mi::placeholder{color:#2a2a2a;}
.input-bottom{display:flex;align-items:center;justify-content:space-between;padding:4px 7px;}
.ab{background:none;border:1px solid var(--border);border-radius:6px;color:var(--muted);font-size:9px;font-family:'Space Mono',monospace;padding:3px 7px;cursor:pointer;}
.ab:hover{border-color:#444;color:#888;}
.sb{background:var(--accent);border:none;border-radius:7px;color:#000;font-size:10px;font-family:'Unbounded',sans-serif;font-weight:700;padding:6px 14px;cursor:pointer;letter-spacing:0.06em;transition:all 0.15s;}
.sb:hover{background:#d4ff4a;transform:scale(1.02);}
.sb:disabled{opacity:0.4;cursor:not-allowed;transform:none;}
.fp{display:flex;gap:6px;flex-wrap:wrap;padding:4px 9px 0;}
.fc{display:flex;align-items:center;gap:4px;background:#1a1a1a;border:1px solid var(--border);border-radius:6px;padding:2px 6px;font-size:9px;color:var(--muted);}
.fc .rx{cursor:pointer;color:#444;}
#fi{display:none;}
</style>
</head>

  <div class="sidebar">
    <div class="sidebar-top">

    </div>
    <div class="tabs" id="tabs"></div>
  </div>
  <div class="main" id="main">
    <div class="nosel"><h3>← ВЫБЕРИ КЛИЕНТА</h3></div>

<script>
const WORKER="https://odd-star-18f8.moneymerchprojects.workers.dev";
const CLIENT_ID="313296848617-7r9ri5vee3gibbqep92g73di2rsgtv62.apps.googleusercontent.com";
const FOLDER_ID="1ZU_RTGb8iCg86318JkCxdaHfZay-MaKz";
const SCOPES="https://www.googleapis.com/auth/spreadsheets https://www.googleapis.com/auth/drive";

let gToken=null, tokenExp=0, tokenClient=null;
let clients=[], activeId=null, files=[];

// STORAGE
function save(){localStorage.setItem('mm_clients',JSON.stringify(clients));}
function load(){try{clients=JSON.parse(localStorage.getItem('mm_clients'))||[];}catch{clients=[];}}

// AUTH
function initAuth(){
  tokenClient=google.accounts.oauth2.initTokenClient({
    client_id:CLIENT_ID, scope:SCOPES,
    callback:(r)=>{
      if(r.access_token){
        gToken=r.access_token;
        tokenExp=Date.now()+(r.expires_in-60)*1000;
        localStorage.setItem('mm_tok',JSON.stringify({t:gToken,e:tokenExp}));
        showApp();
      }
    }
  });
}

function tryRestore(){
  try{
    const s=JSON.parse(localStorage.getItem('mm_tok'));
    if(s&&s.e>Date.now()){gToken=s.t;tokenExp=s.e;return true;}
  }catch{}
  return false;
}

async function ensureToken(){
  if(gToken&&tokenExp>Date.now())return;
  return new Promise(res=>{
    tokenClient.callback=(r)=>{
      if(r.access_token){gToken=r.access_token;tokenExp=Date.now()+(r.expires_in-60)*1000;localStorage.setItem('mm_tok',JSON.stringify({t:gToken,e:tokenExp}));}
      res();
    };
    tokenClient.requestAccessToken({prompt:''});
  });
}

function signIn(){tokenClient.requestAccessToken({prompt:'consent'});}
function signOut(){
  if(gToken)google.accounts.oauth2.revoke(gToken,()=>{});
  gToken=null;localStorage.removeItem('mm_tok');
  document.getElementById('authScreen').style.display='flex';
  document.getElementById('app').classList.remove('visible');
  document.getElementById('badge').style.display='none';
  document.getElementById('signoutBtn').style.display='none';
}

function showApp(){
  document.getElementById('authScreen').style.display='none';
  document.getElementById('app').classList.add('visible');
  document.getElementById('badge').style.display='flex';
  document.getElementById('signoutBtn').style.display='block';
  load();
  renderSidebar();
  if(clients.length>0)switchClient(clients[0].id);
}

// CLIENTS
function newClient(){
  const name=prompt('Имя клиента:');
  if(!name||!name.trim())return;
  const c={id:Date.now().toString(),name:name.trim(),setName:'',messages:[],sheetId:null,sheetUrl:null,created:new Date().toLocaleDateString('ru-RU')};
  clients.unshift(c);save();renderSidebar();switchClient(c.id);
}

function delClient(id,e){
  e.stopPropagation();
  if(!confirm('Удалить клиента?'))return;
  clients=clients.filter(c=>c.id!==id);save();renderSidebar();
  if(activeId===id){activeId=null;document.getElementById('main').innerHTML='<div class="nosel"><h3>← ВЫБЕРИ КЛИЕНТА</h3></div>';}
}

function switchClient(id){
  activeId=id;
  renderSidebar();
  renderClient(clients.find(c=>c.id===id));
}

function renderSidebar(){
  document.getElementById('tabs').innerHTML=clients.map(c=>`
    <div class="tab ${c.id===activeId?'active':''}" onclick="switchClient('${c.id}')">
      <div class="tab-name">${c.name}${c.setName?' · '+c.setName:''}</div>
      <div class="tab-meta">${c.created} · ${c.messages.length} сообщ.</div>
      <button class="tab-del" onclick="delClient('${c.id}',event)">×</button>
    </div>`).join('');
}

function renderClient(c){
  if(!c)return;
  const main=document.getElementById('main');
  main.innerHTML=`
    <div class="table-bar ${c.sheetUrl?'visible':''}" id="tbar">
      ТАБЛИЦА: <a href="${c.sheetUrl||'#'}" target="_blank" id="tlink">${c.sheetUrl?'→ Открыть в Google Sheets':''}</a>
    </div>
    <div class="chat-wrap" id="cw"></div>
    <div class="input-area">
      <div class="input-wrap">
        <div class="client-row">
          <input class="ci" id="cn" placeholder="ИМЯ КЛИЕНТА" value="${c.name}" oninput="updName(this.value)"/>
          <input class="ci" id="sn" placeholder="НАЗВАНИЕ НАБОРА" value="${c.setName||''}" oninput="updSet(this.value)"/>
        </div>
        <div class="fp" id="fp"></div>
        <textarea id="mi" placeholder="Кидай данные о компонентах или напиши что изменить в таблице..." rows="3"></textarea>
        <div class="input-bottom">
          <button class="ab" onclick="document.getElementById('fi').click()">+ ФОТО</button>
          <button class="sb" id="sb" onclick="send()">СОЗДАТЬ / ОБНОВИТЬ →</button>
        </div>
      </div>
      <input type="file" id="fi" accept="image/*" multiple onchange="addFiles(this.files)"/>
    </div>`;

  const cw=document.getElementById('cw');
  if(c.messages.length===0){
    cw.innerHTML=`<div class="empty"><h3>FLYEST ART IN THE GAME</h3><p>Кидай данные о компонентах в любом виде. Или напиши что изменить в уже созданной таблице.</p><div class="etags"><div class="etag" onclick="qf('Коробка крафт 100х100х200мм, 3200 руб/50шт, срок 7 рд')">→ коробка</div><div class="etag" onclick="qf('Тишью синяя 3 листа 30х30см, 800 руб/50шт, срок 1 рд')">→ тишью</div></div></div>`;
  } else {
    c.messages.forEach(m=>addBubble(m.role,m.content,m.isHTML,false));
    cw.scrollTop=cw.scrollHeight;
  }

  document.getElementById('mi').addEventListener('keydown',e=>{
    if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send();}
  });
}

function updName(v){const c=clients.find(x=>x.id===activeId);if(c){c.name=v;save();renderSidebar();}}
function updSet(v){const c=clients.find(x=>x.id===activeId);if(c){c.setName=v;save();renderSidebar();}}

// MESSAGES
function addBubble(role,content,isHTML=false,persist=true){
  const cw=document.getElementById('cw');if(!cw)return;
  const empty=cw.querySelector('.empty');if(empty)empty.remove();
  const div=document.createElement('div');div.className=`msg ${role}`;
  const lbl=document.createElement('div');lbl.className='msg-label';lbl.textContent=role==='user'?'ВЫ':'MM BOT';
  const bub=document.createElement('div');bub.className='msg-bubble';
  if(isHTML)bub.innerHTML=content;else bub.textContent=content;
  div.appendChild(lbl);div.appendChild(bub);cw.appendChild(div);cw.scrollTop=cw.scrollHeight;
  if(persist&&activeId){const c=clients.find(x=>x.id===activeId);if(c){c.messages.push({role,content,isHTML});save();renderSidebar();}}
}

function typing(){
  const cw=document.getElementById('cw');if(!cw)return;
  const empty=cw.querySelector('.empty');if(empty)empty.remove();
  const div=document.createElement('div');div.className='msg bot';div.id='typ';
  div.innerHTML='<div class="msg-label">MM BOT</div><div class="msg-bubble"><div class="typing-dots"><span></span><span></span><span></span></div></div>';
  cw.appendChild(div);cw.scrollTop=cw.scrollHeight;
}
function untyping(){const t=document.getElementById('typ');if(t)t.remove();}

function qf(t){const mi=document.getElementById('mi');if(mi){mi.value=t;mi.focus();}}

// FILES
function addFiles(fs){
  Array.from(fs).forEach(f=>{
    const r=new FileReader();
    r.onload=e=>{files.push({name:f.name,data:e.target.result,type:f.type});renderFiles();};
    r.readAsDataURL(f);
  });
  document.getElementById('fi').value='';
}
function renderFiles(){
  const fp=document.getElementById('fp');if(!fp)return;
  fp.innerHTML=files.map((f,i)=>`<div class="fc">${f.type.startsWith('image/')?'🖼':'📄'} ${f.name} <span class="rx" onclick="removeFile(${i})">×</span></div>`).join('');
}
function removeFile(i){files.splice(i,1);renderFiles();}

// CLAUDE
async function claude(text,imgs){
  const content=[];
  imgs.filter(f=>f.type.startsWith('image/')).forEach(img=>{
    content.push({type:'image',source:{type:'base64',media_type:img.type,data:img.data.split(',')[1]}});
  });
  content.push({type:'text',text});
  const r=await fetch(`${WORKER}?target=claude`,{
    method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({model:'claude-haiku-4-5-20251001',max_tokens:2000,messages:[{role:'user',content}]})
  });
  const d=await r.json();
  if(d.error)throw new Error(d.error.message);
  return d.content?.map(c=>c.text||'').join('');
}

// SHEETS
async function applyWrap(id){
  const h={'Authorization':'Bearer '+gToken,'Content-Type':'application/json'};
  await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${id}:batchUpdate`,{
    method:'POST',headers:h,
    body:JSON.stringify({requests:[{repeatCell:{
      range:{sheetId:0,startRowIndex:0,endRowIndex:1000,startColumnIndex:0,endColumnIndex:20},
      cell:{userEnteredFormat:{wrapStrategy:'WRAP',verticalAlignment:'TOP'}},
      fields:'userEnteredFormat.wrapStrategy,userEnteredFormat.verticalAlignment'
    }}]})
  });
}

async function createSheet(clientName,setName,rows){
  await ensureToken();
  const h={'Authorization':'Bearer '+gToken,'Content-Type':'application/json'};
  const date=new Date().toLocaleDateString('ru-RU');
  const title=`${clientName}_${setName}_${date}`;
  const r1=await fetch('https://sheets.googleapis.com/v4/spreadsheets',{
    method:'POST',headers:h,
    body:JSON.stringify({properties:{title},sheets:[{properties:{title:'Спецификация'}}]})
  });
  const ss=await r1.json();
  if(!ss.spreadsheetId)throw new Error(JSON.stringify(ss));
  const id=ss.spreadsheetId;
  await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${id}/values/Спецификация!A1?valueInputOption=USER_ENTERED`,{
    method:'PUT',headers:h,body:JSON.stringify({values:rows})
  });
  await applyWrap(id);
  await fetch(`https://www.googleapis.com/drive/v3/files/${id}?addParents=${FOLDER_ID}&removeParents=root&fields=id`,{
    method:'PATCH',headers:h,body:JSON.stringify({})
  });
  return {id,url:`https://docs.google.com/spreadsheets/d/${id}`};
}

async function updateSheet(sheetId,rows){
  await ensureToken();
  const h={'Authorization':'Bearer '+gToken,'Content-Type':'application/json'};
  await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${sheetId}/values/Спецификация!A1?valueInputOption=USER_ENTERED`,{
    method:'PUT',headers:h,body:JSON.stringify({values:rows})
  });
  await applyWrap(sheetId);
}

// MAIN SEND
async function send(){
  const text=document.getElementById('mi')?.value.trim();
  const cn=document.getElementById('cn')?.value.trim()||'Клиент';
  const sn=document.getElementById('sn')?.value.trim()||'Набор';
  if(!text&&files.length===0)return;

  const client=clients.find(c=>c.id===activeId);
  if(!client)return;

  const sb=document.getElementById('sb');if(sb)sb.disabled=true;
  let userMsg=text;
  if(files.length>0)userMsg+=(text?'\n':'')+files.map(f=>`[${f.name}]`).join(' ');
  addBubble('user',userMsg);

  files.filter(f=>f.type.startsWith('image/')).forEach(f=>{
    const cw=document.getElementById('cw');if(!cw)return;
    const div=document.createElement('div');div.className='msg user';
    div.innerHTML=`<img class="msg-img" src="${f.data}"/>`;
    cw.appendChild(div);cw.scrollTop=cw.scrollHeight;
  });

  if(document.getElementById('mi'))document.getElementById('mi').value='';
  const curFiles=[...files];files=[];renderFiles();
  typing();

  try{
    // Determine if this is an edit request or new data
    const isEdit = client.sheetId && text && /измен|поменя|обнов|исправ|удал|добав|замен/i.test(text);

    if(isEdit){
      // Get current sheet data
      await ensureToken();
      const h={'Authorization':'Bearer '+gToken};
      const r=await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${client.sheetId}/values/Спецификация!A1:O100`,{headers:h});
      const d=await r.json();
      const currentData=JSON.stringify(d.values||[]);

      const prompt=`Ты редактируешь Google Таблицу спецификаций. Текущие данные (JSON массив строк):
${currentData}

Запрос пользователя: "${text}"

Верни ТОЛЬКО обновлённый JSON массив строк (тот же формат что и входные данные, все строки включая заголовки). Без пояснений, без markdown.`;

      const raw=await claude(prompt,curFiles);
      const newRows=JSON.parse(raw.replace(/```json|```/g,'').trim());
      await updateSheet(client.sheetId,newRows);
      untyping();
      addBubble('bot',`Готово! Таблица обновлена:\n\n<a href="${client.sheetUrl}" target="_blank">→ Открыть в Google Sheets</a>`,true);

    } else {
      // Parse new components
      const prompt=`Из данных ниже извлеки компоненты подарочного набора и верни ТОЛЬКО валидный JSON без пояснений и markdown:
{"components":[{"name":"название","desc":"спецификация","type":"Себес РФ","signal":число_или_null,"cost_per_unit":число_или_null,"deadline_signal":"7 р.д.","deadline_50":"10 р.д.","comment":"","supplier":""}]}

Клиент: ${cn}
Набор: ${sn}
Данные: ${text}`;

      const raw=await claude(prompt,curFiles);
      const parsed=JSON.parse(raw.replace(/```json|```/g,'').trim());
      untyping();

      const comps=parsed.components||[];
      if(comps.length===0)throw new Error('Не удалось распознать компоненты');

      const total=comps.reduce((s,c)=>s+(parseFloat(c.cost_per_unit)||0),0);
      const rows=[
        ['','','','','','','','','Стоимость в руб/шт за ед (себес)','','','Сроки (обязательно в рабочих днях)','','',''],
        ['ID','Тип строки','Ссылка/Фото','Изделие / брендинг','Описание (спецификация)','Поставщик (если бланк)','Комментарии от ПД','Тип расчета','Сигнал','50 шт','Себест/шт (формула)','Сигнал','50 шт','Цена/шт','Итого'],
        ...comps.map((c,i)=>[1,i===0?sn:'','',c.name,c.desc,c.supplier||'',c.comment||'',c.type||'Себес РФ',c.signal||'',c.cost_per_unit||'',i===0?total:'',c.deadline_signal||'',c.deadline_50||'','','']),
        Array(15).fill(''),
        ['','Итого:','','','','','','','','','','','','','']
      ];

      const summary=comps.map((c,i)=>`${i+1}. ${c.name}${c.signal?' — '+c.signal+' руб/50шт':''}${c.deadline_signal?', срок '+c.deadline_signal:''}`).join('\n');
      addBubble('bot',`Распознал ${comps.length} компонент(а):\n\n${summary}\n\nСоздаю таблицу...`);
      typing();

      const {id,url}=await createSheet(cn,sn,rows);
      client.sheetId=id;client.sheetUrl=url;
      client.name=cn;client.setName=sn;
      save();renderSidebar();

      // Show table bar
      const tbar=document.getElementById('tbar');
      const tlink=document.getElementById('tlink');
      if(tbar&&tlink){tbar.classList.add('visible');tlink.href=url;tlink.textContent='→ Открыть в Google Sheets';}

      untyping();
      addBubble('bot',`Готово! Таблица создана:\n\n<a href="${url}" target="_blank">→ Открыть в Google Sheets</a>`,true);
    }
  }catch(e){
    untyping();
    addBubble('bot','Ошибка: '+e.message);
  }
  if(sb)sb.disabled=false;
}

// INIT
window.addEventListener('load',()=>{
  const wait=setInterval(()=>{
    if(typeof google!=='undefined'&&google.accounts){
      clearInterval(wait);
      initAuth();
      if(tryRestore())showApp();
    }
  },100);
});
</script>
